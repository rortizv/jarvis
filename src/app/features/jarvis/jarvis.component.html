<div class="jarvis-container">
  <div class="jarvis-card">
    <h1 class="jarvis-title">JARVIS</h1>
    <p class="jarvis-subtitle">Asistente de voz</p>

    <button
      type="button"
      class="mic-button"
      [class.mic-off]="!store.isJarvisOn()"
      [class.mic-on]="store.isJarvisOn() && !store.isListening()"
      [class.mic-listening]="store.isListening()"
      [attr.aria-pressed]="store.isJarvisOn()"
      [attr.aria-label]="store.isJarvisOn() ? 'Micrófono activo' : 'Micrófono desactivado'"
      disabled
      aria-hidden="true"
    >
      <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
      @if (store.isListening()) {
        <div class="wave-container" aria-hidden="true">
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
        </div>
      }
    </button>

    @if (store.isListening()) {
      <p class="listening-label">Escuchando...</p>
    }

    <div class="toggle-row">
      <span class="toggle-label">{{ store.isJarvisOn() ? 'ON' : 'OFF' }}</span>
      <button
        type="button"
        class="toggle"
        [class.toggle-on]="store.isJarvisOn()"
        (click)="toggle()"
        [attr.aria-checked]="store.isJarvisOn()"
        aria-label="Activar o desactivar Jarvis"
      >
        <span class="toggle-thumb"></span>
      </button>
    </div>
  </div>
</div>
